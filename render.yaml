# Render Blueprint — frontend (static) + API (Flask / gunicorn)
# https://render.com/docs/blueprint-spec
#
# 使用方式：Dashboard → New → Blueprint → 連接本 repo。
# 建立後請在後台補齊環境變數：DATABASE_URL、CORS_ORIGINS（見下方 envVars）。

services:
  # ── React + Vite（SPA，需 rewrite）──
  - type: web
    name: nutriplan-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - frontend/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Flask API ──
  - type: web
    name: nutriplan-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --timeout 600 "app:create_app()"
    healthCheckPath: /health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRES_MINUTES
        value: "30"
      # 在 Dashboard 填入你的 Postgres 連線字串（Neon / RDS 等）
      - key: DATABASE_URL
        sync: false
      # 填入前端正式網址，多個用英文逗號分隔，例如：https://nutriplan-frontend.onrender.com
      - key: CORS_ORIGINS
        sync: false
